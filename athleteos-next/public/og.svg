<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgTop" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.18"/>
      <stop offset="40%" stop-color="#FF0080" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#080809" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgRight" cx="90%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#7B2FFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#080809" stop-opacity="0"/>
    </radialGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="50%" stop-color="#FF0080"/>
      <stop offset="100%" stop-color="#7B2FFF"/>
    </linearGradient>

    <!-- Logo gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF0080"/>
    </linearGradient>

    <!-- Card border gradient -->
    <linearGradient id="cardBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#FF0080" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7B2FFF" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Noise filter for grain texture -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080809"/>
  <rect width="1200" height="630" fill="url(#bgTop)"/>
  <rect width="1200" height="630" fill="url(#bgRight)"/>

  <!-- Grain texture overlay -->
  <rect width="1200" height="630" fill="transparent" filter="url(#grain)" opacity="0.025"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="white" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="80" y1="0" x2="80" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/>
  </g>

  <!-- Left content block -->
  <g transform="translate(80, 80)">
    <!-- Logo mark -->
    <circle cx="20" cy="20" r="10" fill="url(#logoGrad)" opacity="0.9"/>
    <circle cx="20" cy="20" r="7" fill="url(#logoGrad)"/>
    <!-- Logo orbits -->
    <path d="M20 4 A16 16 0 0 1 33.9 12" stroke="url(#logoGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5" fill="none"/>
    <path d="M36 24 A16 16 0 0 1 23 36" stroke="url(#logoGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.4" fill="none"/>
    <path d="M7 24 A16 16 0 0 1 10 12" stroke="url(#logoGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.35" fill="none"/>

    <!-- Wordmark -->
    <text x="52" y="27" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="900" fill="white" letter-spacing="-1" opacity="0.95">athlete</text>
    <text x="148" y="27" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="900" fill="url(#logoGrad)" letter-spacing="-1">OS</text>

    <!-- Divider + badge -->
    <line x1="184" y1="12" x2="184" y2="28" stroke="white" stroke-width="0.8" opacity="0.2"/>
    <text x="192" y="24" font-family="'Helvetica Neue', Arial, monospace" font-size="10" fill="white" opacity="0.3" letter-spacing="1.5">EARLY ACCESS</text>

    <!-- Main headline -->
    <text x="0" y="130" font-family="'Helvetica Neue', Arial, sans-serif" font-size="78" font-weight="900" fill="white" letter-spacing="-3" opacity="0.95">One Variable</text>
    <text x="0" y="220" font-family="'Helvetica Neue', Arial, sans-serif" font-size="78" font-weight="900" fill="url(#textGrad)" letter-spacing="-3">Is Holding</text>
    <text x="0" y="310" font-family="'Helvetica Neue', Arial, sans-serif" font-size="78" font-weight="900" fill="white" letter-spacing="-3" opacity="0.85">You Back.</text>

    <!-- Sub text -->
    <text x="0" y="375" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#6B7280" letter-spacing="-0.3">Free rank check · Training, nutrition &amp; recovery as one system</text>

    <!-- Stats row -->
    <g transform="translate(0, 430)">
      <!-- Stat 1 -->
      <text x="0" y="28" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="800" fill="url(#logoGrad)" letter-spacing="-1">3,200+</text>
      <text x="0" y="48" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6B7280" letter-spacing="1.5">ATHLETES</text>

      <!-- Divider -->
      <line x1="100" y1="8" x2="100" y2="52" stroke="white" stroke-width="0.6" opacity="0.12"/>

      <!-- Stat 2 -->
      <text x="116" y="28" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="800" fill="white" letter-spacing="-1" opacity="0.9">94%</text>
      <text x="116" y="48" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6B7280" letter-spacing="1.5">FIND LIMITER</text>

      <!-- Divider -->
      <line x1="200" y1="8" x2="200" y2="52" stroke="white" stroke-width="0.6" opacity="0.12"/>

      <!-- Stat 3 -->
      <text x="216" y="28" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="800" fill="white" letter-spacing="-1" opacity="0.9">&lt; 60s</text>
      <text x="216" y="48" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6B7280" letter-spacing="1.5">TO RANK</text>
    </g>
  </g>

  <!-- Right side: Rank card -->
  <g transform="translate(780, 80)">
    <!-- Card bg -->
    <rect width="340" height="470" rx="24" fill="rgba(255,255,255,0.025)"/>
    <!-- Card gradient border -->
    <rect width="340" height="470" rx="24" fill="none" stroke="url(#cardBorder)" stroke-width="1.5" opacity="0.8"/>
    <!-- Inner glow -->
    <circle cx="170" cy="0" r="120" fill="url(#bgTop)" opacity="0.5"/>

    <!-- Card header -->
    <text x="28" y="52" font-family="'Helvetica Neue', Arial, monospace" font-size="10" fill="#FF6B35" letter-spacing="1.8">PERFORMANCE RANK</text>

    <!-- Big rank number -->
    <text x="28" y="140" font-family="'Helvetica Neue', Arial, sans-serif" font-size="80" font-weight="900" fill="url(#textGrad)" letter-spacing="-3">Top</text>
    <text x="28" y="230" font-family="'Helvetica Neue', Arial, sans-serif" font-size="80" font-weight="900" fill="white" letter-spacing="-3" opacity="0.95">8%</text>

    <text x="28" y="268" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#6B7280">of competitive strength athletes</text>

    <!-- Divider -->
    <line x1="28" y1="295" x2="312" y2="295" stroke="white" stroke-width="0.6" opacity="0.08"/>

    <!-- Metrics list -->
    <g transform="translate(28, 320)">
      <text x="0" y="0" font-family="'Helvetica Neue', Arial, monospace" font-size="10" fill="#6B7280" letter-spacing="1.5">SQUAT</text>
      <text x="284" y="0" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="700" fill="#FF6B35" text-anchor="end">Top 6%</text>
      <rect x="0" y="8" width="284" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
      <rect x="0" y="8" width="200" height="3" rx="1.5" fill="url(#textGrad)" opacity="0.8"/>

      <text x="0" y="40" font-family="'Helvetica Neue', Arial, monospace" font-size="10" fill="#6B7280" letter-spacing="1.5">DEADLIFT</text>
      <text x="284" y="40" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="700" fill="#F59E0B" text-anchor="end">Top 14%</text>
      <rect x="0" y="48" width="284" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
      <rect x="0" y="48" width="156" height="3" rx="1.5" fill="#F59E0B" opacity="0.8"/>

      <text x="0" y="80" font-family="'Helvetica Neue', Arial, monospace" font-size="10" fill="#6B7280" letter-spacing="1.5">BENCH</text>
      <text x="284" y="80" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="700" fill="#EF4444" text-anchor="end">Top 31%</text>
      <rect x="0" y="88" width="284" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
      <rect x="0" y="88" width="100" height="3" rx="1.5" fill="#EF4444" opacity="0.8"/>
    </g>

    <!-- CTA chip -->
    <g transform="translate(28, 438)">
      <rect width="284" height="36" rx="8" fill="rgba(255,107,53,0.12)" stroke="rgba(255,107,53,0.3)" stroke-width="1"/>
      <text x="142" y="23" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" fill="url(#logoGrad)" text-anchor="middle">Check Your Rank Free →</text>
    </g>
  </g>

  <!-- Bottom URL -->
  <text x="80" y="610" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#6B7280" opacity="0.6" letter-spacing="0.5">athleteos.io</text>
</svg>
